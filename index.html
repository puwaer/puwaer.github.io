<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuki Kouki (幸航輝)</title>
  <meta name="description" content="Yuki Kouki (幸航輝) — 沼津高等専門学校 専攻科">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f8fa;
      --border: #e4e7ec;
      --text: #1a1d24;
      --muted: #5b616e;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e1116;
        --surface: #171b22;
        --border: #2a2f3a;
        --text: #e6e9ef;
        --muted: #9aa3b2;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
      }
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
        "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem 5rem;
    }
    header {
      margin-bottom: 2.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
      letter-spacing: -0.01em;
    }
    h1 .ja {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--muted);
      margin-left: 0.6rem;
    }
    .affiliation {
      color: var(--muted);
      font-size: 1rem;
      margin: 0;
    }
    section {
      margin-top: 2.25rem;
    }
    h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 0.9rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.4rem 1.25rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.35rem 1rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border);
    }
    .row:last-child { border-bottom: none; }
    .row .label {
      flex: 0 0 auto;
      min-width: 8.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .row .value { word-break: break-all; }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .link-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      text-decoration: none;
      transform: translateY(-1px);
    }
    footer {
      margin-top: 3.5rem;
      color: var(--muted);
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Yuki Kouki<span class="ja">幸 航輝</span></h1>
      <p class="affiliation">沼津高等専門学校 専攻科 1年<br>
        <span style="font-size:0.88rem;">National Institute of Technology, Numazu College — Advanced Course, 1st year</span>
      </p>
    </header>

    <section>
      <h2>Contact</h2>
      <div class="card">
        <div class="row">
          <span class="label">Email</span>
          <span class="value"><a href="mailto:0000puwaer@gmail.com">0000puwaer@gmail.com</a></span>
        </div>
        <div class="row">
          <span class="label">Email (所属機関)</span>
          <span class="value"><a href="mailto:a26118@numazu.kosen-ac.jp">a26118@numazu.kosen-ac.jp</a></span>
        </div>
      </div>
    </section>

    <section>

          GitHub
        </a>
        <a class="link-btn" href="https://huggingface.co/puwaer" target="_blank" rel="noopener">
          <span aria-hidden="true">🤗</span>
          Hugging Face
        </a>
      </div>
    </section>

    <footer>
      &copy; <span id="year"></span> Yuki Kouki
    </footer>
  </div>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
